name = 'sbti-test-ai-analysis'
main = "index.js"
compatibility_date = "2024-09-23"

# ── 注意：已移除 [ai] 绑定，改为调用 DeepSeek API ──────────
# DEEPSEEK_API_KEY 作为 Secret 在 CF Dashboard 中设置，不写入此文件

# ── 可配置变量（可在 CF Dashboard → Worker → Settings → Variables 中覆盖）
[vars]

# DeepSeek 模型选择：
#   deepseek-chat    → 最快，适合锐评
#   deepseek-reasoner → 慢但更深刻（会有思考过程）
AI_MODEL = "deepseek-chat"

# AI 最大输出 token 数
AI_MAX_TOKENS = "600"

# AI 温度（1.0 创意最大，DeepSeek 推荐 0.7~1.3）
AI_TEMPERATURE = "1.0"

# 允许跨域调用的来源，多个用英文逗号分隔，不要有空格
ALLOWED_ORIGINS = "https://sbti-test-9tx.pages.dev,https://sbti.pages.dev,https://sbti.985201314.xyz,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080"
