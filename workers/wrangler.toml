name = 'sbti-test-ai-analysis'
main = "index.js"
compatibility_date = "2024-09-23"

# ── 绑定 Cloudflare Workers AI（免费，无需额外 API Key）──────
[ai]
binding = "AI"

# ── 可配置变量（可在 CF Dashboard → Worker → Settings → Variables 中覆盖）
[vars]

# AI 模型（中文能力排序）：
#   最强中文：@cf/qwen/qwen3-30b-a3b-fp8
#   推理最强：@cf/deepseek-ai/deepseek-r1-distill-qwen-32b
#   参数最大：@cf/qwen/qwen2.5-72b-instruct-fp8
AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8"

# AI 最大输出 token 数
AI_MAX_TOKENS = "512"

# AI 温度（0.0~1.0，越高越有创意）
AI_TEMPERATURE = "0.85"

# 允许跨域调用的来源，多个用英文逗号分隔，不要有空格
# 部署完成后改为你的真实 Pages 域名
ALLOWED_ORIGINS = "https://sbti-test-9tx.pages.dev,https://sbti.pages.dev,https://sbti.985201314.xyz,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080"
